<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Monitor | Dashboard</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <span class="loader"></span>
        <p style="margin-top: 1rem; font-weight: 600;">Procesando...</p>
    </div>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1>Docker Monitor</h1>
                <p>Monitoreo de infraestructura en tiempo real</p>
            </div>
            <div class="actions">
                <button id="refreshBtn" class="btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>
                    Actualizar
                </button>
                <button id="collectBtn" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Recolectar Ahora
                </button>
            </div>
        </header>

        <section id="currentStatus">
            <h2 class="section-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
                Contenedores Activos
            </h2>
            <div id="statsGrid" class="stats-grid">
                <!-- Se llenará dinámicamente -->
            </div>
        </section>

        <section id="historySection">
            <h2 class="section-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"></path><circle cx="12" cy="12" r="9"></circle></svg>
                Historial de Eventos
            </h2>
            <div class="history-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Contenedor</th>
                            <th>Imagen</th>
                            <th>Estado</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- Se llenará dinámicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
