services:
  mongodb:
    image: mongo:latest
    container_name: monitor_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: [ PASSWORD ]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - monitor_network

  api:
    build: .
    container_name: monitor_api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://root:[PASSWORD]@mongodb:27017/
      - DB_NAME=monitor-de-logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - monitor_network

volumes:
  mongodb_data:

networks:
  monitor_network:
    driver: bridge
