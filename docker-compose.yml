services:
  mongodb:
    image: mongo:latest
    container_name: monitor_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: egrs
      MONGO_INITDB_ROOT_PASSWORD: mortadela1
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
